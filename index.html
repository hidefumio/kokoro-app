function extractFrames(file, count=6) {
  return new Promise((resolve) => {
    const url = URL.createObjectURL(file);
    const vid = document.createElement("video");
    vid.src = url; vid.muted = true;
    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");
    const out = [];
    vid.addEventListener("loadedmetadata", () => {
      canvas.width = Math.min(vid.videoWidth, 320);
      canvas.height = Math.min(vid.videoHeight, 240);
      const dur = Math.min(vid.duration, 60);
      let i = 0;
      const next = () => { vid.currentTime = (dur / (count+1)) * (i+1); };
      vid.addEventListener("seeked", () => {
        ctx.drawImage(vid, 0, 0, canvas.width, canvas.height);
        out.push(canvas.toDataURL("image/jpeg", 0.7).split(",")[1]);
        i++; if (i < count) next(); else { URL.revokeObjectURL(url); resolve(out); }
      });
      next();
    });
    vid.addEventListener("error", () => resolve([]));
    vid.load();
  });
}

async function callAPI(system, userContent) {
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": API_KEY,
      "anthropic-version": "2023-06-01",
    },
    body: JSON.stringify({
      model: "claude-sonnet-4-6",
      max_tokens: 1000,
      system,
      messages: [{ role: "user", content: userContent }],
    }),
  });
  const data = await res.json();
  return data.content?.map(c => c.text || "").join("") || "";
}

async function analyzeExpression(frames) {
  const system = `重症心身障害児の表情評価専門AIです。FACSとGrimace Scale手法で分析します。
JSONのみで返答:
{"primaryEmotion":"comfort|joy|pain|fatigue|distress|seeking|neutral","confidence":"high|medium|low","scores":{"comfort":0-100,"joy":0-100,"pain":0-100,"fatigue":0-100,"distress":0-100,"seeking":0-100,"neutral":0-100},"grimace":{"brow":{"score":0-100,"grimaceLevel":0-2,"note":"観察"},"eye":{"score":0-100,"grimaceLevel":0-2,"note":"観察"},"nose":{"score":0-100,"grimaceLevel":0-2,"note":"観察"},"mouth":{"score":0-100,"grimaceLevel":0-2,"note":"観察"},"skin":{"score":0-100,"grimaceLevel":0-2,"note":"観察"}},"painScaleEstimate":{"nfcs":0-6,"flacc":0-10,"interpretation":"解釈"},"observations":["観察1","観察2","観察3"],"careActions":["ケア1","ケア2"],"urgency":"routine|attention|urgent"}`;
  const images = frames.slice(0,3).map(b64=>({ type:"image", source:{type:"base64",media_type:"image/jpeg",data:b64} }));
  const text = await callAPI(system, [...images, { type:"text", text:"動画フレームから微細な表情変化を分析してください。" }]);
  return JSON.parse(text.replace(/```json|```/g,"").trim());
}

async function generateVoice(emotion, scores, childName, history, parentMsg) {
  const recentHistory = history.slice(-6).map(m => m.role==="child" ? `[${childName}]: ${m.text}` : `[親]: ${m.text}`).join("\n");
  const system = `重症心身障害のある子どもの「心の声」を代弁するAIです。子ども自身の一人称で、やさしく3〜5文で話します。難しい言葉は使わず、親への愛情を大切に。子どもの名前:${childName}、感情:${emotion}`;
  const userText = `感情スコア:${JSON.stringify(scores)}\n${recentHistory ? "会話履歴:\n"+recentHistory : ""}\n${parentMsg ? "親のメッセージ:「"+parentMsg+"」" : "表情から自然に語りかける"}`;
  return await callAPI(system, [{ type:"text", text:userText }]);
}

}

function useTyping(text, speed=35) {
  const [displayed, setDisplayed] = useState("");
  const [done, setDone] = useState(false);
  useEffect(() => {
    if (!text) { setDisplayed(""); setDone(false); return; }
    setDisplayed(""); setDone(false);
    let i = 0;
    const t = setInterval(() => { i++; setDisplayed(text.slice(0,i)); if (i>=text.length){clearInterval(t);setDone(true);} }, speed);
    return () => clearInterval(t);
  }, [text]);
  return { displayed, done };
}

function SpeechBubble({ text, emotion, childName, isTyping }) {
  const e = EMOTIONS[emotion] || EMOTIONS.neutral;
  const { displayed, done } = useTyping(text);
  const [showHeart, setShowHeart] = useState(false);
  useEffect(() => { if(done) setTimeout(()=>setShowHeart(true),300); else setShowHeart(false); }, [done]);
  return (
    <div style={{ animation:"fadeUp .4s ease", marginBottom:4 }}>
      <div style={{ display:"flex", alignItems:"flex-end", gap:8, marginBottom:4 }}>
        <div style={{ position:"relative", flexShrink:0 }}>

            {e.emoji}
          </div>
          {isTyping && <div style={{ position:"absolute", inset:-6, borderRadius:"50%", border:`2px solid ${e.color}`, animation:"ping 1.2s ease-out infinite", opacity:0 }} />}
        </div>

            </span>

        </div>
        {done && (
          <div style={{ marginTop:8, display:"flex", alignItems:"center", gap:6 }}>

          </div>
        )}
      </div>
    </div>
  );
}

                </button>
                <button onClick={analyze} disabled={analyzing}
                  style={{ flex:2.5, padding:"11px 0", border:"none", borderRadius:11, background:analyzing?"#94A3B8":"linear-gradient(135deg,#1E3A5F,#2D5F8A)", color:"white", fontSize:14, fontWeight:700, cursor:analyzing?"not-allowed":"pointer" }}>
                  {analyzing ? "解析中…" : `🔬 ${childName}の気持ちを読む`}
                </button>
              </div>
            )}

            {error && <div className="card" style={{ background:"#FEF2F2", border:"1px solid #FCA5A5", color:"#B91C1C", fontSize:13 }}>⚠️ {error}</div>}

            {result && e && (
              <div>
                <div className="card">
                  <div style={{ fontSize:13, fontWeight:700, color:"#1E293B", marginBottom:12 }}>感情スコア</div>
                  {Object.entries(result.scores||{}).sort((a,b)=>b[1]-a[1]).map(([key,val])=>{
                    const em=EMOTIONS[key];
                    return (
                      <div key={key} style={{ display:"flex", alignItems:"center", gap:8, marginBottom:8 }}>
                        <span style={{ fontSize:14, width:20 }}>{em?.emoji}</span>
                        <span style={{ fontSize:12, color:"#475569", width:90, flexShrink:0 }}>{em?.label}</span>
                        <Bar value={val} color={em?.color} />
                        <span style={{ fontSize:12, fontWeight:700, color:em?.color, width:36, textAlign:"right" }}>{Math.round(val)}%</span>
                      </div>
                    );
                  })}
                </div>
                {result.painScaleEstimate && (
                  <div className="card">
                    <div style={{ fontSize:13, fontWeight:700, color:"#1E293B", marginBottom:10 }}>疼痛スケール推定</div>
                    <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:10 }}>
                      {[["NFCS",result.painScaleEstimate.nfcs,6,"#EF4444","#FEF2F2"],["FLACC",result.painScaleEstimate.flacc,10,"#F59E0B","#FFFBEB"]].map(([name,val,max,color,bg])=>(
                        <div key={name} style={{ textAlign:"center", padding:"12px 8px", background:bg, borderRadius:10 }}>
                          <div style={{ fontSize:10, color:"#94A3B8", marginBottom:2 }}>{name}</div>
                          <div style={{ fontSize:26, fontWeight:800, color }}>{val}<span style={{ fontSize:12 }}>/{max}</span></div>
                        </div>
                      ))}
                    </div>
                    <div style={{ fontSize:12, color:"#475569", padding:"8px 12px", background:"#F8FAFC", borderRadius:8 }}>📊 {result.painScaleEstimate.interpretation}</div>
                  </div>
                )}
                {result.observations?.length>0 && (
                  <div className="card">
                    <div style={{ fontSize:13, fontWeight:700, color:"#1E293B", marginBottom:8 }}>観察された表情シグナル</div>
                    {result.observations.map((o,i)=>(
                      <div key={i} style={{ display:"flex", gap:7, marginBottom:6, fontSize:13, color:"#334155" }}>
                        <span style={{ color:"#3B82F6", fontWeight:700, flexShrink:0 }}>▸</span>{o}
                      </div>
                    ))}
                  </div>
                )}
                {result.careActions?.length>0 && (
                  <div className="card" style={{ background:"linear-gradient(135deg,#EFF6FF,#F0FDF4)", border:"1px solid #BFDBFE" }}>
                    <div style={{ fontSize:13, fontWeight:700, color:"#1E3A5F", marginBottom:10 }}>🏥 ケアアクション</div>
                    {result.careActions.map((a,i)=>(
                      <div key={i} style={{ display:"flex", gap:8, marginBottom:7, alignItems:"flex-start" }}>
                        <span style={{ background:"#3B82F6", color:"white", fontSize:11, fontWeight:700, width:20, height:20, borderRadius:"50%", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>{i+1}</span>
                        <span style={{ fontSize:13, color:"#1E293B", lineHeight:1.4 }}>{a}</span>
                      </div>
                    ))}
                  </div>
                )}
                {hasSpoken && (
                  <button onClick={()=>setTab("talk")} style={{ width:"100%", padding:"14px 0", border:"none", borderRadius:14, background:`linear-gradient(135deg,${e.color},${e.border})`, color:"white", fontSize:15, fontWeight:800, cursor:"pointer", boxShadow:`0 6px 20px ${e.color}40` }}>
                    💬 {childName}の声を聴く →
                  </button>
                )}
              </div>
            )}
          </div>
        )}

        {/* HISTORY TAB */}
        {tab==="history" && (
          <div className="card">
            <div style={{ fontSize:14, fontWeight:700, color:"#1E3A5F", marginBottom:12 }}>分析・会話の記録</div>
            {history.length===0 ? (
              <div style={{ textAlign:"center", padding:"40px 0", color:"#94A3B8" }}>
                <div style={{ fontSize:40, marginBottom:8 }}>📋</div>
                <div style={{ fontSize:13 }}>まだ記録がありません</div>
              </div>
            ) : history.map((entry,i)=>{
              const em=EMOTIONS[entry.primaryEmotion]||EMOTIONS.neutral;
              const u=URGENCY[entry.urgency]||URGENCY.routine;
              return (
                <div key={i} style={{ padding:"12px 14px", background:em.bg, borderRadius:12, marginBottom:10, borderLeft:`4px solid ${em.color}` }}>
                  <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:entry.voice?8:0 }}>
                    <span style={{ fontSize:22 }}>{em.emoji}</span>
                    <div style={{ flex:1 }}>
                      <div style={{ fontSize:13, fontWeight:700, color:"#1E293B" }}>{em.label}</div>
                      <div style={{ fontSize:11, color:"#94A3B8" }}>{entry.time} · NFCS:{entry.painScaleEstimate?.nfcs??"-"} FLACC:{entry.painScaleEstimate?.flacc??"-"}</div>
                    </div>
                    <span style={{ fontSize:11, padding:"2px 8px", borderRadius:10, background:u.bg, color:u.color, fontWeight:700 }}>{u.label}</span>
                  </div>
                  {entry.voice && (
                    <div style={{ padding:"8px 10px", background:"white", borderRadius:10, fontSize:12, color:"#334155", lineHeight:1.6, borderLeft:`2px solid ${em.color}` }}>
                      💬 "{entry.voice}"
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>
